version: "3.8"

services:
  app:
    build: .
    ports:
      - "3004:3004"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=file:/data/ypv.db
      - NODE_ENV=production
      - PORT=3004
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
